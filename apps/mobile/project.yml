name: TodoApp
options:
  bundleIdPrefix: com.todoapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""

targets:
  TodoApp:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/TodoApp/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
    entitlements:
      path: Sources/TodoApp/TodoApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todoapp.mobile
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets:
        - TodoAppTests

  TodoAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: TodoApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
