name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  web:
    name: Web — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --workspace=packages/shared
      - run: npm test --workspace=apps/web
      - run: npm run build --workspace=apps/web

  api:
    name: API — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test --workspace=apps/api

  ios:
    name: iOS — build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install xcodegen xcbeautify
      - name: Generate Xcode project
        working-directory: apps/mobile
        run: xcodegen generate
      - name: Build & test
        working-directory: apps/mobile
        run: |
          xcodebuild test \
            -project TodoApp.xcodeproj \
            -scheme TodoApp \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            | xcbeautify
